name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Toolchain Versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Dependencies
        run: swift package --package-path CoverCraftPackage resolve

      - name: Build Package
        run: swift build --package-path CoverCraftPackage -c release

      - name: Run Tests
        run: swift test --package-path CoverCraftPackage --parallel

  build-ios:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build for iOS Simulator
        run: xcodebuild build -workspace CoverCraft.xcworkspace -scheme CoverCraft -destination 'platform=iOS Simulator,name=iPhone 16 Pro' -configuration Debug CODE_SIGNING_ALLOWED=NO
